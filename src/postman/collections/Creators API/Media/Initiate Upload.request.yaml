$kind: http-request
url: "{{base_url}}/media/uploads"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "fileName": "example.jpg",
      "mimeType": "image/jpeg",
      "sizeBytes": 102400,
      "kind": "post_image"
    }
order: 1000
