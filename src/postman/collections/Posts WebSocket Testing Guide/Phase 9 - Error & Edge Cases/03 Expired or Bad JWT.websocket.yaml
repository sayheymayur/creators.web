$kind: websocket-request
name: '03 Expired or Bad JWT'
order: 3000
description: |-
  **Phase 9 — Error & Edge Cases: Expired / Invalid JWT**

  Test that the server rejects a WebSocket connection with an invalid or expired token.

  **Steps:**
  1. Use an expired or deliberately wrong JWT in the URL
  2. Replace `{{token}}` with a bad value, e.g. `badtoken123`
  3. Click **Connect**

  **Expected:**
  - ✅ Immediate disconnect, OR
  - ✅ HTTP 401 upgrade rejection before the connection is established

  **Verify:**
  - ✅ Connection does NOT stay open
  - ✅ Status shows disconnected or an error code
  - ✅ No messages can be sent

  **Note:** To test this, temporarily change the URL below to use a hardcoded bad token.
url: 'wss://your-host/ws?token=badtoken_replace_me'
headers:
  - key: Sec-WebSocket-Protocol
    value: text
