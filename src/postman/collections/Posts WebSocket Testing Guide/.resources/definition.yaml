$kind: collection
description: >-
  ## Posts WebSocket testing guide


  Use this guide to verify the posts WebSocket service step by step.


  ### Protocol overview


  The posts service uses a line-based WebSocket protocol.


  Start by selecting the service:


  ``` text

  > posts

   ```

  Or select the service and attach a request ID that will be echoed back in
  responses:


  ``` text

  > posts <requestId>

   ```

  After selecting the service, send one command per line.


  Example:


  ``` text

  > posts list1

  /list feed 30

   ```

  ### Wire formats


  Successful command response:


  ``` text

  |posts|<command>|<requestId>|<JSON body>

   ```

  Error response:


  ``` text

  |posts|error|<requestId>|<message>

   ```

  Server push event:


  ``` text

  |posts|<event>|<JSON body>

   ```

  Notes:


  - `requestId` helps match a response to the command you sent.
      
  - Push events do not include a `requestId`.
      
  - Always select the `posts` service before sending posts commands.
      

  ---


  ## Step-by-step test cases


  ### 1\. List the feed


  Send:


  ``` text

  > posts list1

  /list feed 30

   ```

  Expected success format:


  ``` text

  |posts|list|list1|{"posts":[...],"nextCursor":null}

   ```

  Check:


  - response command is `list`
      
  - `requestId` is `list1`
      
  - response body contains `posts`
      
  - response body may contain `nextCursor`
      

  ---


  ### 2\. List posts by creator


  Send:


  ``` text

  > posts creator1

  /list creator <creatorUserId> 10

   ```

  Expected success format:


  ``` text

  |posts|list|creator1|{"posts":[...],"nextCursor":...}

   ```

  Check:


  - only the selected creator’s posts are returned
      
  - `posts` is present
      
  - pagination field is returned when applicable
      

  ---


  ### 3\. Create a public post


  Requires an authenticated creator/admin user.


  Send:


  ``` text

  > posts create1

  /create public Hello from websocket test

   ```

  Expected success format:


  ``` text

  |posts|create|create1|{"post":{...}}

   ```

  Expected push event:


  ``` text

  |posts|new|{...}

   ```

  Check:


  - response command is `create`
      
  - returned body contains `post`
      
  - created post visibility is `public`
      
  - a `new` event is broadcast by the server
      

  ---


  ### 4\. Create a PPV post


  Requires an authenticated creator/admin user.


  Send:


  ``` text

  > posts create2

  /create ppv 499 Premium content from websocket

   ```

  Expected success format:


  ``` text

  |posts|create|create2|{"post":{...}}

   ```

  Check:


  - created post visibility is `ppv`
      
  - `ppv_price_usd_cents` is `499`
      
  - post text matches the submitted content
      

  ---


  ### 5\. Update an existing post


  Requires ownership or appropriate authorization.


  Send:


  ``` text

  > posts update1

  /update <postId> Updated text from websocket

   ```

  Expected success format:


  ``` text

  |posts|update|update1|{"post":{...}}

   ```

  Expected push event:


  ``` text

  |posts|updated|{...}

   ```

  Check:


  - response command is `update`
      
  - returned post has the updated text
      
  - server emits an `updated` event
      

  ---


  ### 6\. Delete a post


  Requires ownership or appropriate authorization.


  Send:


  ``` text

  > posts delete1

  /delete <postId>

   ```

  Expected success format:


  ``` text

  |posts|delete|delete1|{"ok":true}

   ```

  Expected push event:


  ``` text

  |posts|deleted|{"id":"<postId>","user_id":"<authorUserId>"}

   ```

  Check:


  - response command is `delete`
      
  - response confirms success
      
  - server emits a `deleted` event for the removed post
      

  ---


  ### 7\. Like a post


  Requires authentication.


  Send:


  ``` text

  > posts like1

  /like <postId>

   ```

  Expected success format:


  ``` text

  |posts|like|like1|{"postId":"...","like_count":number,"likedByMe":true}

   ```

  Expected push event:


  ``` text

  |posts|likeupdate|{"post_id":"...","like_count":number}

   ```

  Check:


  - `likedByMe` becomes `true`
      
  - `like_count` increases as expected
      
  - server emits `likeupdate`
      

  ---


  ### 8\. Unlike a post


  Requires authentication.


  Send:


  ``` text

  > posts unlike1

  /unlike <postId>

   ```

  Expected success format:


  ``` text

  |posts|unlike|unlike1|{"postId":"...","like_count":number,"likedByMe":false}

   ```

  Check:


  - `likedByMe` becomes `false`
      
  - `like_count` decreases as expected
      

  ---


  ### 9\. Add a comment


  Requires authentication.


  Send:


  ``` text

  > posts comment1

  /comment <postId> Nice post

   ```

  Expected success format:


  ``` text

  |posts|comment|comment1|{"comment":{...}}

   ```

  Expected push event:


  ``` text

  |posts|newcomment|{...}

   ```

  Check:


  - response command is `comment`
      
  - body contains a `comment`
      
  - server emits `newcomment`
      

  ---


  ### 10\. List comments


  Send:


  ``` text

  > posts comments1

  /comments <postId> 30

   ```

  Expected success format:


  ``` text

  |posts|comments|comments1|{"comments":[...],"nextCursor":null}

   ```

  Check:


  - response command is `comments`
      
  - body contains `comments`
      
  - pagination is returned when applicable
      

  ---


  ## Error handling checks


  ### 11\. Unauthenticated create attempt


  Send without logging in:


  ``` text

  > posts err1

  /create public Should fail

   ```

  Expected error format:


  ``` text

  |posts|error|err1|Login required

   ```

  Check:


  - command is `error`
      
  - request ID matches
      
  - message is `Login required`
      

  ---


  ### 12\. Unauthenticated like attempt


  Send without logging in:


  ``` text

  > posts err2

  /like <postId>

   ```

  Expected error format:


  ``` text

  |posts|error|err2|Login required

   ```

  ---


  ### 13\. Non-creator create attempt


  Send while authenticated as a user without creator/admin permissions:


  ``` text

  > posts err3

  /create public Should fail for non-creator

   ```

  Expected error format:


  ``` text

  |posts|error|err3|Creators only

   ```

  ---


  ## Suggested verification order


  Run the checks in this order:


  1. `/list`
      
  2. `/create public`
      
  3. `/create ppv`
      
  4. `/update`
      
  5. `/like`
      
  6. `/unlike`
      
  7. `/comment`
      
  8. `/comments`
      
  9. `/delete`
      
  10. unauthenticated and authorization error checks
      

  This order makes it easier to reuse the created `postId` in later tests.


  ---


  ## Test execution notes


  - Save the created `postId` from the create response and reuse it in update,
  like, unlike, comment, comments, and delete steps.
      
  - If pagination is supported, repeat list/comments requests using the returned
  cursor.
      
  - Verify both direct command responses and push events.
      
  - If multiple clients are connected, confirm that push events are visible
  across clients where expected.
