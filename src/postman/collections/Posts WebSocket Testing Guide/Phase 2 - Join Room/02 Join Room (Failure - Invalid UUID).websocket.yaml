$kind: websocket-request
name: '02 Join Room (Failure - Invalid UUID)'
order: 2000
description: |-
  **Phase 2 — Join Room: Failure Test**

  Test that the server rejects an invalid room UUID.

  **Message to send:**
  ```
  > chat r1
  /joinroom not-a-uuid
  ```

  **Expected response:**
  ```
  |chat|error|r1|<error message>
  ```

  **Verify:**
  - ✅ Response frame contains `error` in the second segment
  - ✅ requestId `r1` is echoed back
  - ✅ An error message is returned (not a crash or silent failure)
url: '{{ws_url}}'
headers:
  - key: Sec-WebSocket-Protocol
    value: text
