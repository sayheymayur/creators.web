$kind: http-request
name: 01 Login to get JWT token
description: >-
  **Step 1 — Get a fresh JWT token**


  Call your Login API (or Firebase exchange) to get a fresh JWT token before
  connecting.

  The script below auto-saves the token to the `token` environment variable.


  ✅ Check: Response contains a valid JWT

  ✅ Check: `token` env variable is set after running
url: "{{base_url}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "abhaydemo4@gmail.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.token) {
        pm.environment.set("token", res.token);
        console.log("✅ Token saved to environment");
      } else {
        console.warn("⚠️ No token in response:", JSON.stringify(res));
      }
    language: text/javascript
order: 1166
